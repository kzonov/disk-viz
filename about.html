<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self';">
  <title>About Disk Viz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px 32px;
      user-select: none;
      -webkit-user-select: none;
    }
    .icon {
      width: 128px;
      height: 128px;
      margin-bottom: 14px;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.4));
    }
    .name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .version {
      margin-top: 4px;
      font-size: 12px;
      color: #9090a8;
    }
    .tagline {
      margin-top: 10px;
      font-size: 13px;
      color: #b8b8c8;
      max-width: 280px;
      line-height: 1.45;
    }
    .links {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .links a {
      color: #7ab0ff;
      text-decoration: none;
      font-size: 13px;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .copyright {
      margin-top: 22px;
      font-size: 11px;
      color: #6a6a80;
    }
  </style>
</head>
<body>
  <img class="icon" src="docs/icon.png" alt="" />
  <div class="name">Disk Viz</div>
  <div class="version" id="version"></div>
  <div class="tagline">macOS disk usage visualizer — see where your space goes as an interactive sunburst.</div>
  <div class="links">
    <a href="https://github.com/kzonov/disk-viz">GitHub repository</a>
    <a href="https://github.com/kzonov/disk-viz/blob/main/LICENSE">MIT License</a>
    <a href="https://zonov.me">zonov.me</a>
  </div>
  <div class="copyright">© 2026 Kirill Zonov</div>
  <script src="renderer/about.js"></script>
</body>
</html>
